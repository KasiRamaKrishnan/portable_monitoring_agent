[monitor]
monitor_node ansible_host=172.31.8.27 ansible_user=ubuntu

[workers]
worker_node1 ansible_host=172.31.8.73 ansible_user=ubuntu
worker_node2 ansible_host=172.31.11.31 ansible_user=ubuntu

# ─── Windows Worker Nodes ────────────────────────────────────────────────────
# Replace with your actual Windows node IPs and credentials.
# WinRM must be enabled on target hosts: run Enable-PSRemoting as Administrator.
[windows_workers]
# win_node1 ansible_host=192.168.1.100
# win_node2 ansible_host=192.168.1.101

[windows_workers:vars]
ansible_connection=winrm
ansible_winrm_transport=ntlm
ansible_winrm_server_cert_validation=ignore
ansible_user=Administrator
# ansible_password=<your_password>   # Use ansible-vault for production
ansible_port=5985

[all:vars]
ansible_ssh_private_key_file=~/sree.pem
monitor_node_ip=172.31.8.27
