# =============================================================================
# Ansible Group Variables
# =============================================================================

# ─── Monitor server ───────────────────────────────────────────────────────────
monitor_ip: "{{ hostvars['monitor_node']['ansible_host'] }}"

# ─── Component versions (mirrors versions.env) ───────────────────────────────
# Update versions in versions.env — this file reads from it.
alloy_version: "1.3.1"

# ─── Linux SSH credentials ────────────────────────────────────────────────────
ansible_user: ubuntu
ansible_ssh_private_key_file: ~/sree.pem

# ─── Windows WinRM credentials ────────────────────────────────────────────────
# Set ansible_password via ansible-vault or environment variable — do not
# store passwords in plain text in version control.
# Example: ansible-playbook playbook-windows.yml --ask-vault-pass
# Or:      export ANSIBLE_VAULT_PASSWORD_FILE=~/.vault_pass
