---
# Ansible Playbook: Setup Windows Exporter and Promtail on Windows nodes
# Requirements:
#   - WinRM must be enabled on target hosts (run Enable-PSRemoting as Admin)
#   - pywinrm installed on control node: pip install pywinrm
#   - Windows nodes listed under [windows_workers] in inventory.ini

- name: Setup Windows Exporter and Promtail on Windows nodes
  hosts: windows_workers
  gather_facts: yes

  vars:
    windows_exporter_version: "0.25.1"
    promtail_version: "2.9.4"
    windows_exporter_port: 9182
    promtail_port: 9080
    install_dir: 'C:\monitoring'
    promtail_data_dir: 'C:\monitoring\promtail-data'
    windows_exporter_url: "https://github.com/prometheus-community/windows_exporter/releases/download/v{{ windows_exporter_version }}/windows_exporter-{{ windows_exporter_version }}-amd64.exe"
    promtail_url: "https://github.com/grafana/loki/releases/download/v{{ promtail_version }}/promtail-windows-amd64.exe.zip"

  tasks:
    - name: Create monitoring installation directory
      win_file:
        path: "{{ install_dir }}"
        state: directory

    - name: Create Promtail data directory
      win_file:
        path: "{{ promtail_data_dir }}"
        state: directory

    # ─── Windows Exporter ────────────────────────────────────────────────────

    - name: Download Windows Exporter
      win_get_url:
        url: "{{ windows_exporter_url }}"
        dest: "{{ install_dir }}\\windows_exporter.exe"
        force: no

    - name: Install Windows Exporter as a Windows service
      win_service:
        name: windows_exporter
        path: >-
          "{{ install_dir }}\windows_exporter.exe"
          --collectors.enabled="cpu,cs,logical_disk,net,os,process,service,system,textfile,memory"
          --telemetry.addr=:{{ windows_exporter_port }}
        display_name: Windows Exporter (Prometheus)
        description: Exposes Windows system metrics for Prometheus scraping
        start_mode: auto
        state: started

    - name: Open firewall rule for Windows Exporter
      win_firewall_rule:
        name: "Windows Exporter {{ windows_exporter_port }}"
        localport: "{{ windows_exporter_port }}"
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    # ─── Promtail ─────────────────────────────────────────────────────────────

    - name: Download Promtail for Windows (zip)
      win_get_url:
        url: "{{ promtail_url }}"
        dest: "{{ install_dir }}\\promtail.zip"
        force: no

    - name: Unzip Promtail
      win_unzip:
        src: "{{ install_dir }}\\promtail.zip"
        dest: "{{ install_dir }}"
        creates: "{{ install_dir }}\\promtail-windows-amd64.exe"

    - name: Rename Promtail binary for convenience
      win_copy:
        src: "{{ install_dir }}\\promtail-windows-amd64.exe"
        dest: "{{ install_dir }}\\promtail.exe"
        remote_src: yes
        force: no

    - name: Deploy Promtail config from template
      win_template:
        src: "{{ playbook_dir }}/../files/promtail-windows.yaml.j2"
        dest: "{{ install_dir }}\\promtail-config.yaml"

    - name: Install Promtail as a Windows service (via NSSM or sc.exe)
      win_shell: |
        $svcName = "promtail"
        $svcPath = "{{ install_dir }}\promtail.exe"
        $svcArgs = "-config.file={{ install_dir }}\promtail-config.yaml"
        if (-not (Get-Service -Name $svcName -ErrorAction SilentlyContinue)) {
            sc.exe create $svcName binPath= "$svcPath $svcArgs" start= auto
            sc.exe description $svcName "Grafana Promtail log shipper"
        }
        Start-Service -Name $svcName -ErrorAction SilentlyContinue
      args:
        executable: powershell

    - name: Open firewall rule for Promtail
      win_firewall_rule:
        name: "Promtail {{ promtail_port }}"
        localport: "{{ promtail_port }}"
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    # ─── Verify services are running ──────────────────────────────────────────

    - name: Verify Windows Exporter service is running
      win_service:
        name: windows_exporter
        state: started

    - name: Verify Promtail service is running
      win_shell: |
        $svc = Get-Service -Name "promtail" -ErrorAction SilentlyContinue
        if ($svc -and $svc.Status -eq "Running") { "OK" } else { "NOT_RUNNING" }
      register: promtail_status
      args:
        executable: powershell

    - name: Show Promtail status
      debug:
        msg: "Promtail service status: {{ promtail_status.stdout | trim }}"
