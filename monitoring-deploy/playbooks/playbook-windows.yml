- name: Setup Windows monitoring agents (Docker + Promtail + Windows Exporter)
  hosts: windows
  gather_facts: no
  become: no

  vars:
    promtail_config_dir: "C:\\Promtail"
    promtail_config_file: "{{ promtail_config_dir }}\\promtail-config.yaml"
    monitor_ip: "{{ hostvars[groups['monitor'][0]]['ansible_host'] }}"

  tasks:
    - name: Ensure PowerShell execution policy allows scripts
      win_shell: Set-ExecutionPolicy -ExecutionPolicy RemoteSigned -Force

    - name: Ensure Promtail directory exists
      win_file:
        path: "{{ promtail_config_dir }}"
        state: directory

    - name: Create Promtail configuration file from template
      win_template:
        src: ~/portable_monitoring_agent/monitoring-deploy/files/promtail-config-windows.yaml.j2
        dest: "{{ promtail_config_file }}"

    - name: Install DockerMsftProvider
      win_shell: |
        Install-Module -Name DockerMsftProvider -Repository PSGallery -Force

    - name: Install Docker on Windows
      win_shell: |
        Install-Package -Name docker -ProviderName DockerMsftProvider -Force

    - name: Start Docker service
      win_service:
        name: docker
        start_mode: auto
        state: started

    - name: Ensure old Windows Exporter container is removed
      win_shell: |
        if (docker ps -a --format "{{'{{.Names}}'}}" | findstr /I "windows_exporter") {
          docker rm -f windows_exporter
        }
      ignore_errors: yes

    - name: Ensure old Promtail container is removed
      win_shell: |
        if (docker ps -a --format "{{'{{.Names}}'}}" | findstr /I "promtail") {
          docker rm -f promtail
        }
      ignore_errors: yes

    - name: Run Windows Exporter container
      win_shell: |
        docker run -d --name windows_exporter `
          -p 9182:9182 `
          prom/windows-exporter:latest `
          --collectors.enabled "cpu,cs,logical_disk,net,os,system"

    - name: Run Promtail container
      win_shell: |
        docker run -d --name promtail `
          -v {{ promtail_config_dir }}:C:\Promtail `
          -p 9080:9080 `
          grafana/promtail:2.9.4 `
          -config.file=C:\Promtail\promtail-config.yaml -config.expand-env=true

    - name: Display running containers
      win_shell: docker ps
      register: docker_status

    - name: Show container status
      debug:
        var: docker_status.stdout_lines
