---
# =============================================================================
# Ansible Playbook: Deploy Grafana Alloy on Windows Worker Nodes
# Replaces: Windows Exporter service + Promtail service (2 separate tools)
#
# Alloy is installed via its official Windows MSI installer.
# It collects Windows metrics AND Event Logs, then pushes both to the monitor.
#
# Requirements:
#   - WinRM enabled on target: run Enable-PSRemoting as Administrator
#   - pywinrm on control node: pip install pywinrm
#   - Inventory: hosts listed under [windows_workers]
# =============================================================================

- name: Deploy Grafana Alloy on Windows worker nodes
  hosts: windows_workers
  gather_facts: yes

  vars:
    alloy_version: "1.3.1"
    install_dir: 'C:\Program Files\GrafanaLabs\Alloy'
    config_dir: 'C:\Program Files\GrafanaLabs\Alloy'
    data_dir: 'C:\ProgramData\Alloy'
    alloy_msi_url: "https://github.com/grafana/alloy/releases/download/v{{ alloy_version }}/alloy-installer-windows-amd64.exe.zip"
    alloy_service_name: "Alloy"
    monitor_ip: "{{ hostvars['monitor_node']['ansible_host'] }}"

  tasks:

    # ─── Create directories ────────────────────────────────────────────────────
    - name: Create Alloy data directory
      win_file:
        path: "{{ data_dir }}"
        state: directory

    - name: Create temp download directory
      win_file:
        path: 'C:\temp\alloy-install'
        state: directory

    # ─── Download and install Alloy ───────────────────────────────────────────
    - name: Check if Alloy is already installed
      win_service:
        name: "{{ alloy_service_name }}"
      register: alloy_svc_check
      ignore_errors: yes

    - name: Download Alloy Windows installer zip
      win_get_url:
        url: "{{ alloy_msi_url }}"
        dest: 'C:\temp\alloy-install\alloy.zip'
        force: no
      when: alloy_svc_check.state is not defined

    - name: Unzip Alloy installer
      win_unzip:
        src: 'C:\temp\alloy-install\alloy.zip'
        dest: 'C:\temp\alloy-install'
        creates: 'C:\temp\alloy-install\alloy-installer-windows-amd64.exe'
      when: alloy_svc_check.state is not defined

    - name: Install Alloy silently
      win_shell: |
        & 'C:\temp\alloy-install\alloy-installer-windows-amd64.exe' /S `
          /D="{{ install_dir }}"
      args:
        executable: powershell
      when: alloy_svc_check.state is not defined

    # ─── Deploy config from Jinja2 template ───────────────────────────────────
    - name: Deploy Alloy config
      win_template:
        src: "{{ playbook_dir }}/../files/alloy-windows.alloy.j2"
        dest: "{{ config_dir }}\\config.alloy"
      notify: Restart Alloy Windows

    # ─── Configure Alloy service ──────────────────────────────────────────────
    - name: Set Alloy service config path via registry
      win_regedit:
        path: 'HKLM:\SYSTEM\CurrentControlSet\Services\Alloy'
        name: ImagePath
        data: '"{{ install_dir }}\alloy.exe" run "{{ config_dir }}\config.alloy" --stability.level=generally-available'
        type: string
      notify: Restart Alloy Windows

    - name: Ensure Alloy service is started and set to automatic
      win_service:
        name: "{{ alloy_service_name }}"
        state: started
        start_mode: auto

    # ─── Firewall rules ────────────────────────────────────────────────────────
    - name: Open Alloy HTTP UI port (12345)
      win_firewall_rule:
        name: "Grafana Alloy UI"
        localport: 12345
        action: allow
        direction: in
        protocol: tcp
        state: present
        enabled: yes

    # ─── Clean up installer ────────────────────────────────────────────────────
    - name: Remove installer temp files
      win_file:
        path: 'C:\temp\alloy-install'
        state: absent
      ignore_errors: yes

    # ─── Verify ───────────────────────────────────────────────────────────────
    - name: Verify Alloy service is running
      win_service:
        name: "{{ alloy_service_name }}"
      register: alloy_final_status

    - name: Show Alloy status
      debug:
        msg:
          - "Grafana Alloy running on {{ inventory_hostname }}"
          - "Service state: {{ alloy_final_status.state }}"
          - "Pushing metrics → http://{{ monitor_ip }}:9090/api/v1/write"
          - "Pushing logs    → http://{{ monitor_ip }}:3100/loki/api/v1/push"
          - "Alloy UI        → http://{{ ansible_host }}:12345"

  handlers:
    - name: Restart Alloy Windows
      win_service:
        name: "{{ alloy_service_name }}"
        state: restarted
