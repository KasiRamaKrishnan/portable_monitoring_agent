- name: Setup monitoring stack on monitor node
  hosts: monitor
  become: yes

  tasks:
    - name: Install dependencies
      apt:
        name:
          - git
          - docker.io
          - python3-venv
        update_cache: yes
        state: present

    - name: Ensure Docker is running
      service:
        name: docker
        state: started
        enabled: yes

    - name: Create Python virtual environment for monitoring
      command: python3 -m venv /opt/monitoring-venv
      args:
        creates: /opt/monitoring-venv

    - name: Upgrade pip in virtual environment
      command: /opt/monitoring-venv/bin/pip install --upgrade pip

    - name: Install Docker SDK for Python in venv
      pip:
        name: docker
        virtualenv: /opt/monitoring-venv

    - name: Run Node Exporter
      community.docker.docker_container:
        name: node_exporter
        image: quay.io/prometheus/node-exporter
        ports:
          - "9100:9100"
        restart_policy: always
        volumes:
          - /proc:/host/proc:ro
          - /sys:/host/sys:ro
          - /:/rootfs:ro
        command:
          - "--path.procfs=/host/proc"
          - "--path.sysfs=/host/sys"
          - "--path.rootfs=/rootfs"

    - name: Create Promtail data directory
      file:
        path: /var/lib/promtail
        state: directory
        owner: ubuntu
        group: ubuntu
        mode: '0755'

    - name: Copy Promtail Jinja template config to host
      template:
        src: ~/portable_monitoring_agent/monitoring-deploy/files/promtail-config.yaml.j2
        dest: /opt/promtail-config.yaml
        owner: ubuntu
        group: ubuntu
        mode: '0644'

    - name: Run Promtail container
      docker_container:
        name: promtail
        image: grafana/promtail:2.9.4
        network_mode: host
        volumes:
          - /var/log:/var/log
          - /opt/promtail-config.yaml:/etc/promtail/promtail.yaml
          - /var/lib/promtail:/var/lib/promtail
        env:
          MONITOR_IP: "{{ monitor_node_ip }}"
        command: -config.file=/etc/promtail/promtail.yaml -config.expand-env=true
        restart_policy: always


    - name: Generate prometheus.yml dynamically
      template:
        src: /home/ubuntu/portable_monitoring_agent/monitoring-deploy/files/prometheus.yml.j2
        dest: /home/ubuntu/portable_monitoring_agent/prometheus.yml


    - name: Build Docker image for monitoring agent
      command: docker build -t monitoring-agent-kasi .
      args:
        chdir: "/home/ubuntu/portable_monitoring_agent"

    - name: Run monitoring agent container
      docker_container:
        name: monitor_agent_machine
        image: monitoring-agent-kasi
        restart_policy: always
        ports:
          - "3000:3000"
          - "9090:9090"
          - "3100:3100"
        volumes:
          - "/home/ubuntu/portable_monitoring_agent/prometheus.yml:/etc/prometheus/prometheus.yml"
