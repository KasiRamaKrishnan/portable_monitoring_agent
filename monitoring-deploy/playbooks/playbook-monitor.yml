---
# =============================================================================
# Ansible Playbook: Setup Monitor Server
# Deploys the full monitoring backend using docker-compose.
# Services: Prometheus, Loki, Grafana, Alertmanager
#
# Replaces: manual Docker build + supervisord monolithic container
# =============================================================================

- name: Setup monitoring server with docker-compose
  hosts: monitor
  become: yes

  vars:
    repo_dir: "/home/{{ ansible_user }}/portable_monitoring_agent"
    compose_project: "monitoring"

  tasks:

    # ─── System dependencies ─────────────────────────────────────────────────
    - name: Install required packages
      apt:
        name:
          - git
          - docker.io
          - docker-compose-plugin
          - python3-pip
          - python3-docker
        update_cache: yes
        state: present

    - name: Start and enable Docker
      service:
        name: docker
        state: started
        enabled: yes

    - name: Add ansible user to docker group
      user:
        name: "{{ ansible_user }}"
        groups: docker
        append: yes

    # ─── Copy repo to monitor node ────────────────────────────────────────────
    - name: Ensure repo directory exists
      file:
        path: "{{ repo_dir }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'

    - name: Sync repository files to monitor node
      synchronize:
        src: "{{ playbook_dir }}/../../"
        dest: "{{ repo_dir }}/"
        rsync_opts:
          - "--exclude=.git"
          - "--exclude=__pycache__"

    # ─── Create .env file from versions.env ───────────────────────────────────
    # docker-compose reads .env automatically for variable substitution.
    - name: Copy versions.env as .env for docker-compose
      copy:
        src: "{{ repo_dir }}/versions.env"
        dest: "{{ repo_dir }}/.env"
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0600'
        remote_src: yes

    # ─── Persistent data directories ─────────────────────────────────────────
    # Docker named volumes handle this automatically, but ensure permissions.
    - name: Ensure config directories exist
      file:
        path: "{{ repo_dir }}/{{ item }}"
        state: directory
        owner: "{{ ansible_user }}"
        group: "{{ ansible_user }}"
        mode: '0755'
      loop:
        - config/prometheus
        - config/loki
        - config/alertmanager
        - grafana/provisioning/datasources
        - grafana/provisioning/dashboards
        - grafana/dashboards

    # ─── Start stack with docker-compose ──────────────────────────────────────
    - name: Pull latest images
      command: docker compose pull
      args:
        chdir: "{{ repo_dir }}"
      register: pull_result
      changed_when: "'Pulled' in pull_result.stdout"

    - name: Start monitoring stack (docker-compose up)
      command: docker compose up -d --remove-orphans
      args:
        chdir: "{{ repo_dir }}"
      register: compose_result

    - name: Show docker-compose result
      debug:
        msg: "{{ compose_result.stdout_lines }}"

    # ─── Verify all services are healthy ─────────────────────────────────────
    - name: Wait for Prometheus to be healthy
      uri:
        url: "http://localhost:9090/-/healthy"
        status_code: 200
      register: prometheus_health
      until: prometheus_health.status == 200
      retries: 10
      delay: 5

    - name: Wait for Grafana to be healthy
      uri:
        url: "http://localhost:3000/api/health"
        status_code: 200
      register: grafana_health
      until: grafana_health.status == 200
      retries: 10
      delay: 5

    - name: Wait for Loki to be ready
      uri:
        url: "http://localhost:3100/ready"
        status_code: 200
      register: loki_health
      until: loki_health.status == 200
      retries: 15
      delay: 5

    - name: Print access URLs
      debug:
        msg:
          - "=== Monitoring stack is running ==="
          - "Grafana:      http://{{ ansible_host }}:3000  (admin / admin)"
          - "Prometheus:   http://{{ ansible_host }}:9090"
          - "Loki:         http://{{ ansible_host }}:3100"
          - "Alertmanager: http://{{ ansible_host }}:9093"
