# =============================================================================
# Prometheus Configuration — Push Model
#
# Alloy agents on Linux, Windows, and Kubernetes push metrics here via
# remote_write. Prometheus does NOT need to know any worker IP addresses.
#
# Prometheus is started with --web.enable-remote-write-receiver so it
# accepts incoming metric pushes on POST /api/v1/write.
# =============================================================================

global:
  scrape_interval: 15s
  evaluation_interval: 15s
  # Attached to all time-series produced by this Prometheus instance
  external_labels:
    monitor: 'portable-monitoring-agent'

# ─── Alertmanager ──────────────────────────────────────────────────────────────
alerting:
  alertmanagers:
    - static_configs:
        - targets:
            - alertmanager:9093

# ─── Alert & Recording Rules ───────────────────────────────────────────────────
rule_files:
  - /etc/prometheus/alerts.yml

# ─── Scrape Configs ────────────────────────────────────────────────────────────
# Only the monitor server's own services are scraped here.
# All worker/node metrics arrive via remote_write from Alloy agents.
scrape_configs:

  - job_name: 'prometheus'
    static_configs:
      - targets: ['localhost:9090']

  - job_name: 'alertmanager'
    static_configs:
      - targets: ['alertmanager:9093']

  - job_name: 'loki'
    static_configs:
      - targets: ['loki:3100']

  - job_name: 'grafana'
    metrics_path: /metrics
    static_configs:
      - targets: ['grafana:3000']
