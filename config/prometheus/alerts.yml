# =============================================================================
# Prometheus Alert Rules
# Covers: Linux nodes, Windows nodes, Kubernetes workloads
# =============================================================================

groups:

  # ─── Availability ───────────────────────────────────────────────────────────
  - name: availability
    rules:
      - alert: InstanceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Instance {{ $labels.instance }} is down"
          description: "{{ $labels.instance }} (job={{ $labels.job }}) has been unreachable for more than 1 minute."

      - alert: AlloyAgentDown
        expr: absent(alloy_build_info)
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "No Grafana Alloy agents are reporting"
          description: "No Alloy agents have sent data in the last 5 minutes. Check agent deployments."

  # ─── CPU ────────────────────────────────────────────────────────────────────
  - name: cpu
    rules:
      - alert: HighCPUUsageLinux
        expr: 100 - (avg by (instance) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
          platform: linux
        annotations:
          summary: "High CPU on {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }} (threshold: 90%)."

      - alert: HighCPUUsageWindows
        expr: 100 - (avg by (instance) (rate(windows_cpu_time_total{mode="idle"}[2m])) * 100) > 90
        for: 5m
        labels:
          severity: warning
          platform: windows
        annotations:
          summary: "High CPU on Windows node {{ $labels.instance }}"
          description: "CPU usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }} (threshold: 90%)."

  # ─── Memory ─────────────────────────────────────────────────────────────────
  - name: memory
    rules:
      - alert: HighMemoryUsageLinux
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          platform: linux
        annotations:
          summary: "High memory on {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }} (threshold: 85%)."

      - alert: HighMemoryUsageWindows
        expr: 100 - ((windows_os_physical_memory_free_bytes / windows_cs_physical_memory_bytes) * 100) > 85
        for: 5m
        labels:
          severity: warning
          platform: windows
        annotations:
          summary: "High memory on Windows node {{ $labels.instance }}"
          description: "Memory usage is {{ $value | printf \"%.1f\" }}% on {{ $labels.instance }} (threshold: 85%)."

  # ─── Disk ───────────────────────────────────────────────────────────────────
  - name: disk
    rules:
      - alert: DiskSpaceLowLinux
        expr: (node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"} / node_filesystem_size_bytes) * 100 < 15
        for: 5m
        labels:
          severity: warning
          platform: linux
        annotations:
          summary: "Low disk space on {{ $labels.instance }}"
          description: "Disk {{ $labels.mountpoint }} on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}% free (threshold: 15%)."

      - alert: DiskSpaceLowWindows
        expr: (windows_logical_disk_free_bytes{volume!~"HarddiskVolume.*"} / windows_logical_disk_size_bytes) * 100 < 15
        for: 5m
        labels:
          severity: warning
          platform: windows
        annotations:
          summary: "Low disk space on Windows node {{ $labels.instance }}"
          description: "Volume {{ $labels.volume }} on {{ $labels.instance }} is {{ $value | printf \"%.1f\" }}% free."

      - alert: DiskWillFillIn4Hours
        expr: predict_linear(node_filesystem_avail_bytes{fstype!~"tmpfs|fuse.lxcfs|squashfs"}[1h], 4 * 3600) < 0
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Disk {{ $labels.mountpoint }} on {{ $labels.instance }} will fill in ~4 hours"
          description: "Based on the current fill rate, disk {{ $labels.mountpoint }} will be full within 4 hours."

  # ─── Kubernetes ─────────────────────────────────────────────────────────────
  - name: kubernetes
    rules:
      - alert: KubernetesPodCrashLooping
        expr: rate(kube_pod_container_status_restarts_total[5m]) * 60 * 5 > 5
        for: 5m
        labels:
          severity: critical
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
          description: "Container {{ $labels.container }} in pod {{ $labels.pod }} has restarted more than 5 times in 5 minutes."

      - alert: KubernetesDeploymentReplicasMismatch
        expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"
          description: "Desired: {{ $labels.spec_replicas }}, Available: {{ $labels.status_replicas_available }}."

      - alert: KubernetesNodeNotReady
        expr: kube_node_status_condition{condition="Ready",status="true"} == 0
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Kubernetes node {{ $labels.node }} is not ready"
          description: "Node {{ $labels.node }} has been in NotReady state for more than 2 minutes."

      - alert: KubernetesPodOOMKilled
        expr: kube_pod_container_status_last_terminated_reason{reason="OOMKilled"} == 1
        for: 0m
        labels:
          severity: warning
        annotations:
          summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} was OOMKilled"
          description: "Container {{ $labels.container }} was killed due to out-of-memory."

      - alert: KubernetesHighNodeMemory
        expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
        for: 5m
        labels:
          severity: warning
          platform: kubernetes
        annotations:
          summary: "High memory on Kubernetes node {{ $labels.instance }}"
          description: "Node memory usage is {{ $value | printf \"%.1f\" }}%."
