# =============================================================================
# Loki Configuration
# Fixed from original:
#   - Storage moved from /tmp (ephemeral) to /var/lib/loki (persistent volume)
#   - Schema upgraded from v11 (boltdb-shipper) to v13 (TSDB) — faster queries,
#     lower memory usage
#   - Retention enabled: logs kept for 30 days
# =============================================================================

auth_enabled: false

server:
  http_listen_port: 3100
  grpc_listen_port: 9095
  log_level: info

common:
  path_prefix: /var/lib/loki
  replication_factor: 1
  ring:
    instance_addr: 127.0.0.1
    kvstore:
      store: inmemory

# ─── Schema — v13 with TSDB (replaces deprecated v11 boltdb-shipper) ──────────
schema_config:
  configs:
    - from: 2024-01-01
      store: tsdb
      object_store: filesystem
      schema: v13
      index:
        prefix: index_
        period: 24h

# ─── Storage — persistent filesystem (not /tmp) ───────────────────────────────
storage_config:
  tsdb_shipper:
    active_index_directory: /var/lib/loki/tsdb-index
    cache_location: /var/lib/loki/tsdb-cache
    shared_store: filesystem
  filesystem:
    directory: /var/lib/loki/chunks

# ─── Compactor — handles retention deletion ───────────────────────────────────
compactor:
  working_directory: /var/lib/loki/compactor
  shared_store: filesystem
  compaction_interval: 10m
  retention_enabled: true         # was: false (logs were kept forever)
  retention_delete_delay: 2h
  retention_delete_worker_count: 150

# ─── Limits — 30-day retention ────────────────────────────────────────────────
limits_config:
  reject_old_samples: true
  reject_old_samples_max_age: 168h
  retention_period: 720h          # 30 days (was: 0s = infinite)
  max_query_length: 721h

ingester:
  chunk_idle_period: 1h
  chunk_retain_period: 30s
  max_transfer_retries: 0
  lifecycler:
    ring:
      kvstore:
        store: inmemory
      replication_factor: 1
    final_sleep: 0s

query_range:
  results_cache:
    cache:
      embedded_cache:
        enabled: true
        max_size_mb: 100
