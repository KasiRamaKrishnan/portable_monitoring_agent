# =============================================================================
# Alertmanager Configuration
#
# Configure your notification channels below.
# Supports: Slack, email, PagerDuty, OpsGenie, webhook, and more.
#
# To use secrets safely, set them via environment variables and reference
# them here with $VAR_NAME syntax, then add to your .env file.
# =============================================================================

global:
  # How long to wait before sending a resolved notification
  resolve_timeout: 5m

  # ─── Email (uncomment and fill in to enable) ───────────────────────────────
  # smtp_smarthost: 'smtp.gmail.com:587'
  # smtp_from: 'alertmanager@yourdomain.com'
  # smtp_auth_username: 'alertmanager@yourdomain.com'
  # smtp_auth_password: '$SMTP_PASSWORD'    # set in .env
  # smtp_require_tls: true

  # ─── Slack (uncomment and fill in to enable) ───────────────────────────────
  # slack_api_url: '$SLACK_WEBHOOK_URL'     # set in .env

# ─── Routing tree ──────────────────────────────────────────────────────────────
# Alerts flow top-down through this tree to find their receiver.
route:
  group_by: ['alertname', 'cluster', 'hostname', 'platform']
  group_wait: 30s          # Wait this long to batch alerts in the same group
  group_interval: 5m       # Wait this long before sending a new notification for a group
  repeat_interval: 4h      # Re-notify if alert is still firing after this long
  receiver: 'default'

  routes:
    # Critical alerts get sent immediately to the critical receiver
    - match:
        severity: critical
      receiver: 'critical'
      group_wait: 10s
      repeat_interval: 1h

    # Kubernetes-specific alerts
    - match:
        platform: kubernetes
      receiver: 'default'

# ─── Receivers ────────────────────────────────────────────────────────────────
receivers:
  # Default: logs to console (replace with your channel below)
  - name: 'default'
    # Uncomment one or more of the following:

    # webhook_configs:
    #   - url: 'http://your-webhook-endpoint/alert'
    #     send_resolved: true

    # slack_configs:
    #   - channel: '#alerts'
    #     send_resolved: true
    #     title: '[{{ .Status | toUpper }}] {{ .GroupLabels.alertname }}'
    #     text: >-
    #       {{ range .Alerts }}
    #         *Alert:* {{ .Annotations.summary }}
    #         *Description:* {{ .Annotations.description }}
    #         *Severity:* {{ .Labels.severity }}
    #       {{ end }}

    # email_configs:
    #   - to: 'team@yourdomain.com'
    #     send_resolved: true

  - name: 'critical'
    # Same as default for now — configure a separate critical channel here
    # e.g. PagerDuty, phone call, dedicated Slack channel

    # pagerduty_configs:
    #   - routing_key: '$PAGERDUTY_KEY'    # set in .env
    #     description: '{{ .CommonAnnotations.summary }}'

# ─── Inhibition rules ─────────────────────────────────────────────────────────
# Suppress warning alerts when a critical alert for the same instance is firing.
inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname', 'instance']
