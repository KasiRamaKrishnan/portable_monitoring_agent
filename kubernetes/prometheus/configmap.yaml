apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: monitoring
data:
  prometheus.yml: |
    # =========================================================================
    # Prometheus — Push Model (Alloy agents push via remote_write)
    # No scrape configs for nodes/pods — Alloy DaemonSet handles collection.
    # =========================================================================

    global:
      scrape_interval: 15s
      evaluation_interval: 15s
      external_labels:
        cluster: 'default'

    alerting:
      alertmanagers:
        - static_configs:
            - targets:
                - alertmanager.monitoring.svc.cluster.local:9093

    rule_files:
      - /etc/prometheus/alerts.yml

    scrape_configs:
      # Prometheus self-monitoring
      - job_name: 'prometheus'
        static_configs:
          - targets: ['localhost:9090']

      # Alertmanager self-monitoring
      - job_name: 'alertmanager'
        static_configs:
          - targets: ['alertmanager.monitoring.svc.cluster.local:9093']

      # Alloy agent health (headless service → one endpoint per DaemonSet pod)
      - job_name: 'alloy'
        kubernetes_sd_configs:
          - role: endpoints
            namespaces:
              names: ['monitoring']
        relabel_configs:
          - source_labels: [__meta_kubernetes_service_name]
            action: keep
            regex: alloy

  alerts.yml: |
    groups:
      - name: availability
        rules:
          - alert: InstanceDown
            expr: up == 0
            for: 1m
            labels:
              severity: critical
            annotations:
              summary: "Instance {{ $labels.instance }} is down"
              description: "{{ $labels.instance }} has been unreachable for more than 1 minute."

          - alert: AlloyAgentDown
            expr: absent(alloy_build_info)
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "No Grafana Alloy agents reporting"
              description: "No Alloy agents have sent data in 5 minutes."

      - name: kubernetes
        rules:
          - alert: KubernetesPodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total[5m]) * 300 > 5
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod {{ $labels.namespace }}/{{ $labels.pod }} is crash-looping"
              description: "Container {{ $labels.container }} restarted more than 5 times in 5 minutes."

          - alert: KubernetesDeploymentReplicasMismatch
            expr: kube_deployment_spec_replicas != kube_deployment_status_replicas_available
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Deployment {{ $labels.namespace }}/{{ $labels.deployment }} has unavailable replicas"

          - alert: KubernetesNodeNotReady
            expr: kube_node_status_condition{condition="Ready",status="true"} == 0
            for: 2m
            labels:
              severity: critical
            annotations:
              summary: "Node {{ $labels.node }} is not ready"

          - alert: HighNodeCPU
            expr: 100 - (avg by(node) (rate(node_cpu_seconds_total{mode="idle"}[2m])) * 100) > 90
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High CPU on node {{ $labels.node }}"
              description: "CPU usage is {{ $value | printf \"%.1f\" }}%."

          - alert: HighNodeMemory
            expr: (1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100 > 85
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "High memory on node {{ $labels.instance }}"
              description: "Memory usage is {{ $value | printf \"%.1f\" }}%."
