apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yml: |
    global:
      resolve_timeout: 5m

    route:
      group_by: ['alertname', 'cluster', 'namespace']
      group_wait: 30s
      group_interval: 5m
      repeat_interval: 4h
      receiver: 'default'
      routes:
        - match:
            severity: critical
          receiver: 'critical'
          group_wait: 10s
          repeat_interval: 1h

    receivers:
      - name: 'default'
        # Configure your notification channel here.
        # See config/alertmanager/alertmanager.yml for examples.

      - name: 'critical'
        # Configure a separate critical channel here (PagerDuty, etc.)

    inhibit_rules:
      - source_match:
          severity: 'critical'
        target_match:
          severity: 'warning'
        equal: ['alertname', 'namespace']
